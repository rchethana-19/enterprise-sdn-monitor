<!DOCTYPE html>
<html>

<head>

    <title>SecureSDN Dashboard</title>

    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

    <meta http-equiv="refresh" content="5">

    <style>

        body {
            margin: 0;
            background-color: #0f172a;
            color: white;
            font-family: Arial;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        #cy {
            width: 70%;
            height: 90vh;
            float: left;
            background-color: #111827;
        }

        .panel {
            width: 30%;
            height: 90vh;
            float: right;
            background-color: #1e293b;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: #0f172a;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .metric {
            font-size: 40px;
            font-weight: bold;
            color: #38bdf8;
        }

        .status-up {
            color: #4ade80;
            font-weight: bold;
        }

    </style>

</head>

<body>

<h1>SecureSDN Enterprise Monitoring Dashboard</h1>

<div id="cy"></div>

<div class="panel">

    <div class="card">
        <h2>Packets Sent</h2>
        <div class="metric">{{ transmitted }}</div>
    </div>

    <div class="card">
        <h2>Packets Received</h2>
        <div class="metric">{{ received }}</div>
    </div>

    <div class="card">
        <h2>Packet Loss</h2>
        <div class="metric">{{ packet_loss }}%</div>
    </div>

    <div class="card">
        <h2>Latency</h2>
        <div class="metric">{{ latency }} ms</div>
    </div>

    <div class="card">
        <h2>Firewall</h2>
        <div class="status-up">ACTIVE</div>
    </div>

</div>

<script>

var cy = cytoscape({

    container: document.getElementById('cy'),

    elements: [

        { data: { id: 'controller', label: 'SDN Controller' } },
        { data: { id: 'firewall', label: 'Firewall' } },
        { data: { id: 'switch', label: 'Core Switch' } },

        { data: { id: 'eng', label: 'Engineering' } },
        { data: { id: 'hr', label: 'HR' } },
        { data: { id: 'finance', label: 'Finance' } },

        { data: { id: 'web', label: 'Web Server' } },
        { data: { id: 'db', label: 'Database' } },

        { data: { source: 'controller', target: 'firewall' } },
        { data: { source: 'firewall', target: 'switch' } },

        { data: { source: 'switch', target: 'eng' } },
        { data: { source: 'switch', target: 'hr' } },
        { data: { source: 'switch', target: 'finance' } },

        { data: { source: 'switch', target: 'web' } },
        { data: { source: 'switch', target: 'db' } },

    ],

    style: [

        {
            selector: 'node',
            style: {
                'background-color': '#22c55e',
                'label': 'data(label)',
                'color': 'white',
                'text-valign': 'center',
                'text-halign': 'center',
                'font-size': '12px',
                'width': '60px',
                'height': '60px'
            }
        },

        {
            selector: 'edge',
            style: {
                'width': 3,
                'line-color': '#38bdf8'
            }
        }

    ],

    layout: {
        name: 'breadthfirst',
        directed: true,
        padding: 10
    }

});

</script>

</body>
</html>
